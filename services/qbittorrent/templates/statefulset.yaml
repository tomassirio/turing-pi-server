apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "qbittorrent.fullname" . }}
  labels:
    app: {{ include "qbittorrent.name" . }}
spec:
  serviceName: {{ include "qbittorrent.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "qbittorrent.name" . }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app: {{ include "qbittorrent.name" . }}
    spec:
      initContainers:
        {{- include "common.restore.initContainer" (dict "Values" .Values "AppName" "qbittorrent" "ConfigPath" "/config") | nindent 8 }}
        - name: fix-permissions
          image: busybox:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "🔧 Fixing permissions for qBittorrent (user 1000)..."
              chown -R 1000:1000 /config 2>/dev/null || true
              chmod -R u+rwX /config 2>/dev/null || true
              echo "✅ Permissions fixed."
          volumeMounts:
            - name: config
              mountPath: /config
          securityContext:
            runAsUser: 0
      containers:
        - name: qbittorrent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.webuiPort }}
            - containerPort: {{ .Values.torrentPort }}
          env:
            - name: PUID
              value: "{{ .Values.env.PUID }}"
            - name: PGID
              value: "{{ .Values.env.PGID }}"
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: root
              mountPath: /data
            - name: config
              mountPath: /config
            {{- if .Values.persistence.restore.enabled }}
            - name: {{ if eq .Values.persistence.restore.existingClaim .Values.persistence.backup.existingClaim }}backup{{ else }}restore{{ end }}
              mountPath: {{ .Values.persistence.restore.mountPath }}
              {{- if .Values.persistence.restore.readOnly }}
              readOnly: true
              {{- end }}
            {{- end }}
            {{- if .Values.persistence.backup.enabled }}
            - name: backup
              mountPath: {{ .Values.persistence.backup.mountPath }}
              {{- if .Values.persistence.backup.readOnly }}
              readOnly: true
              {{- end }}
            {{- end }}
        {{- if .Values.vpn.enabled }}
        - name: gluetun
          image: {{ .Values.vpn.image.repository }}:{{ .Values.vpn.image.tag }}
          imagePullPolicy: {{ .Values.vpn.image.pullPolicy }}
          resources:
            {{- toYaml .Values.vpn.resources | nindent 12 }}
          securityContext: {{ toYaml .Values.vpn.securityContext | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.vpn.secretName }}
          env:
            - name: VPN_SERVICE_PROVIDER
              value: {{ .Values.vpn.provider }}
            - name: VPN_TYPE
              value: {{ .Values.vpn.type }}
            - name: SERVER_COUNTRIES
              value: {{ .Values.vpn.countries }}
            - name: DOT
              value: {{ .Values.vpn.dot | quote }}
            - name: DNS_ADDRESS
              value: {{ .Values.vpn.dnsAddress | quote }}
            - name: HEALTH_TARGET_ADDRESS
              value: {{ .Values.vpn.healthTargetAddress | quote }}
        {{- end }}
        {{- if .Values.exporter.enabled }}
        - name: exporter
          image: "{{ .Values.exporter.image.repository }}:{{ .Values.exporter.image.tag }}"
          imagePullPolicy: {{ .Values.exporter.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.exporter.port }}
              protocol: TCP
          env:
            - name: QBITTORRENT_HOST
              value: "localhost"
            - name: QBITTORRENT_PORT
              value: "{{ .Values.webuiPort }}"
            - name: EXPORTER_PORT
              value: "{{ .Values.exporter.port }}"
            - name: EXPORTER_LOG_LEVEL
              value: "{{ .Values.exporter.logLevel }}"
          envFrom:
            - secretRef:
                name: {{ include "qbittorrent.fullname" . }}-exporter
          resources:
            {{- toYaml .Values.exporter.resources | nindent 12 }}
        {{- end }}
      {{- if .Values.additionalContainers }}
        {{- toYaml .Values.additionalContainers | nindent 8 }}
      {{- end }}
        {{- include "common.backup.sidecar" (dict "Values" .Values "AppName" "qbittorrent" "ConfigPath" "/config") | nindent 8 }}
      volumes:
        - name: root
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.root.existingClaim }}
        - name: config
          emptyDir: {}
        {{- if and .Values.persistence.restore.enabled (ne .Values.persistence.restore.existingClaim .Values.persistence.backup.existingClaim) }}
        - name: restore
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.restore.existingClaim }}
        {{- end }}
        {{- if .Values.persistence.backup.enabled }}
        - name: backup
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.backup.existingClaim }}
        {{- end }}

