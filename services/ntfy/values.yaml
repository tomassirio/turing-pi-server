# Default values for ntfy.
replicaCount: 1

image:
  repository: binwiederhier/ntfy
  tag: v2.15.0
  pullPolicy: IfNotPresent

imagePullSecrets: []
  # - name: regcred

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: ntfy.localhome.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    - secretName: localhome-tls
      hosts:
        - ntfy.localhome.com

persistence:
  cache:
    enabled: true
    type: emptyDir  # Use emptyDir like sonarr/radarr
    mountPath: /var/cache/ntfy
  config:
    enabled: true
    mountPath: /etc/ntfy
  restore:
    enabled: true
    existingClaim: nas-config-pvc
    mountPath: /restore-source
    readOnly: true
  backup:
    enabled: true
    existingClaim: nas-config-pvc
    mountPath: /backup-dest
    readOnly: false

env:
  TZ: "Europe/Amsterdam"

resources: {}

# This is to setup the liveness and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

serviceAccount:
  create: true
  automount: true
  name: ""

# Run as ntfy user (UID 1000)
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
