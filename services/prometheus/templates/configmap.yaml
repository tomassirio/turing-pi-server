apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus.fullname" . }}-config
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    # Load scrape configurations from separate files
    # Organized by folders: core/, kubernetes/, <project>/
    scrape_config_files:
      - /etc/prometheus/scrape-configs/core-scrape-config.yml
      - /etc/prometheus/scrape-configs/kubernetes-discovery-config.yml
      - /etc/prometheus/scrape-configs/wanderer-production-scrape-config.yml
      - /etc/prometheus/scrape-configs/wanderer-development-scrape-config.yml

