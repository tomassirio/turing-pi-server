apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus.fullname" . }}-wanderer-development-scrape-config
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
    project: wanderer
    environment: development
data:
  wanderer-development-scrape-config.yml: |
    # Wanderer Backend - Development Environment
    # Namespace: wanderer-dev
    # Team: Wanderer
    
    # Wanderer Auth Service
    - job_name: 'wanderer-auth-dev'
      metrics_path: '/actuator/prometheus'
      scrape_interval: 15s
      scrape_timeout: 10s
      static_configs:
        - targets: ['wanderer-auth-dev.wanderer-dev.svc.cluster.local:8083']
          labels:
            project: 'wanderer'
            application: 'wanderer-auth'
            environment: 'development'
            namespace: 'wanderer-dev'
            component: 'auth'

    # Wanderer Command Service
    - job_name: 'wanderer-command-dev'
      metrics_path: '/actuator/prometheus'
      scrape_interval: 15s
      scrape_timeout: 10s
      static_configs:
        - targets: ['wanderer-command-dev.wanderer-dev.svc.cluster.local:8081']
          labels:
            project: 'wanderer'
            application: 'wanderer-command'
            environment: 'development'
            namespace: 'wanderer-dev'
            component: 'command'

    # Wanderer Query Service
    - job_name: 'wanderer-query-dev'
      metrics_path: '/actuator/prometheus'
      scrape_interval: 15s
      scrape_timeout: 10s
      static_configs:
        - targets: ['wanderer-query-dev.wanderer-dev.svc.cluster.local:8082']
          labels:
            project: 'wanderer'
            application: 'wanderer-query'
            environment: 'development'
            namespace: 'wanderer-dev'
            component: 'query'
