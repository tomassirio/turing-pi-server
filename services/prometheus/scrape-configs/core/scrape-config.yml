# Core Prometheus Scrape Configurations
# Self-monitoring and essential infrastructure metrics
#
# Copy this content into the main configmap.yaml under scrape_configs section

# Prometheus self-monitoring
- job_name: 'prometheus'
  static_configs:
    - targets: ['localhost:9090']
      labels:
        component: 'prometheus'
        type: 'monitoring'

# Scrape kube-state-metrics for Kubernetes object metrics
- job_name: 'kube-state-metrics'
  static_configs:
    - targets: ['kube-state-metrics:8080']
      labels:
        component: 'kube-state-metrics'
        type: 'monitoring'
