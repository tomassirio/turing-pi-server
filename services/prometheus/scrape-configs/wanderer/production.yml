# Wanderer Backend - Production Environment
# Namespace: wanderer
# 
# Copy this content into the main configmap.yaml under scrape_configs section

- job_name: 'wanderer-auth-prod'
  metrics_path: '/actuator/prometheus'
  scrape_interval: 15s
  scrape_timeout: 10s
  static_configs:
    - targets: ['wanderer-auth.wanderer.svc.cluster.local:8083']
      labels:
        project: 'wanderer'
        application: 'wanderer-auth'
        environment: 'production'
        namespace: 'wanderer'
        component: 'auth'

- job_name: 'wanderer-command-prod'
  metrics_path: '/actuator/prometheus'
