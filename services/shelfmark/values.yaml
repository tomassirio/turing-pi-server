#   periodSeconds: 30
#   timeoutSeconds: 10
#   failureThreshold: 10
#
# readinessProbe:
#   tcpSocket:
#     port: 8084
#   initialDelaySeconds: 120
#   periodSeconds: 10
#   timeoutSeconds: 5
#   failureThreshold: 10

autoscaling:
  enabled: false

persistence:
  books:
    enabled: true
    existingClaim: nas-pvc
    mountPath: /books
  config:
    enabled: true
    type: emptyDir
  data:
    enabled: true
    type: emptyDir

nodeSelector: {}
  # kubernetes.io/hostname: turing-01

tolerations: []

affinity: {}

