# Default values for shelfmark.

replicaCount: 1

image:
  repository: ghcr.io/calibrain/shelfmark
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8084

webuiPort: 8084

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: shelfmark.localhome.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: localhome-tls
      hosts:
        - shelfmark.localhome.com

env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Europe/Amsterdam"
  PORT: "8084"
  CALIBRE_WEB_URL: "http://calibre-web.localhome.com"
  NODE_ENV: "production"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 2Gi
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 1Gi

# Probes temporarily disabled for debugging
# startupProbe:
#   tcpSocket:
#     port: 8084
#   initialDelaySeconds: 30
#   periodSeconds: 10
#   timeoutSeconds: 5
#   failureThreshold: 30
#
# livenessProbe:
#   tcpSocket:
#     port: 8084
