# Default values for FTP Server (vsftpd).
# This is a YAML-formatted file.
# Exposes the Guests folder via FTP for friends to download files.

# This will set the replicaset count
replicaCount: 1

# Container image configuration - using delfer/alpine-ftp-server (multi-arch including ARM64)
image:
  repository: delfer/alpine-ftp-server
  tag: latest
  pullPolicy: IfNotPresent

# Image pull secrets
imagePullSecrets: []

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

# Service configuration - FTP uses ports 21 (control) and passive range
service:
  type: LoadBalancer
  ftpPort: 21
  # Passive port range for data connections
  passivePortStart: 21000
  passivePortEnd: 21010

# Environment variables for alpine-ftp-server
env:
  # FTP user credentials (format: user|password|folder|uid)
  USERS: "guest|changeme|/ftp/guests|1000"
  # Passive address (your external IP or hostname)
  ADDRESS: "ftp.localhome.com"
  # Minimum passive port
  MIN_PORT: "21000"
  # Maximum passive port
  MAX_PORT: "21010"

# Persistence configuration - for the NAS Guests folder
persistence:
  # Data volume for NAS Guests folder - this is what will be shared via FTP
  data:
    enabled: true
    existingClaim: nas-guests-pvc
    mountPath: /ftp/guests

# Ingress is not needed for FTP (it uses LoadBalancer service directly)
ingress:
  enabled: false

# Resources limits
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# No HTTP probes for FTP server (FTP doesn't use HTTP)
livenessProbe: {}
readinessProbe: {}

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Node selector, tolerations and affinity
nodeSelector: {}

tolerations: []

affinity: {}

